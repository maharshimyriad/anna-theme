name: Deploy Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22

          script: |
            THEME_DIR=/home/u526221970/domains/firebrick-eel-667446.hostingersite.com/public_html/wp-content/themes/anna-theme

            cd "$THEME_DIR"

            git pull origin main