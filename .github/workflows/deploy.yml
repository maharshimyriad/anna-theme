name: Deploy Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Pull latest code on server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 65002
          script: |
            THEME_DIR=/home/u526221970/domains/firebrick-eel-667446.hostingersite.com/public_html/wp-content/themes/anna-themeanna-theme
            GIT_SSH="GIT_SSH_COMMAND=\"ssh -i /home/u526221970/.ssh/anna-theme -o UserKnownHostsFile=/home/u526221970/.ssh/known_hosts -o StrictHostKeyChecking=yes\""

            # Pull main theme
            cd "$THEME_DIR"
            eval $GIT_SSH git pull origin main
